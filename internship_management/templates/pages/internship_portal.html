{% extends "templates/web.html" %}

{% block page_content %}
<link rel="stylesheet" href="/assets/internship_management/krcs-brand.css" />
<style>
  /* Fallback if KRCS image missing */
  .krcs-logo{min-height:48px;}
</style>
<div class="container">
	<div class="d-flex align-items-center gap-3 mb-3">
		<img class="krcs-logo" src="/assets/internship_management/krce-logo.png" alt="Kenya Red Cross" />
		<h2 class="mb-0">Available Internships</h2>
	</div>


	<div id="vacancies" class="row"></div>

	<hr class="my-4" />

	<h3 class="mb-3">Apply</h3>
	<form id="applyForm" enctype="multipart/form-data">
		<!-- Hidden: Opportunity Advertisement id (backend expects `vacancy_applied_for`) -->
		<input type="hidden" name="vacancy_applied_for" id="advertisement_applied_for" />



		<div class="row g-3">
			<!-- Internship period (required by backend mandatory fields) -->
			<div class="col-md-6">
				<label class="form-label">Internship Start Date</label>
				<input class="form-control" name="internship_start_date" type="date" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Internship End Date</label>
				<input class="form-control" name="internship_end_date" type="date" required />
			</div>

			<!-- Preferred department (required by backend mandatory fields) -->
			<div class="col-md-6">
				<label class="form-label">Preferred Department</label>
				<input class="form-control" name="preferred_department" required />
				<small class="text-muted">Enter the department you prefer</small>
			</div>

			<div class="col-md-6">
				<label class="form-label">First Name</label>
				<input class="form-control" name="first_name" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Last Name</label>
				<input class="form-control" name="last_name" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Date of Birth</label>
				<input class="form-control" name="dob" type="date" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Gender</label>
				<select class="form-select" name="gender" required>
					<option value="">Select</option>
					<option>Female</option>
					<option>Male</option>
					<option>Others</option>
				</select>
			</div>
			<div class="col-md-6">
				<label class="form-label">National ID</label>
				<input class="form-control" name="national_id" />
			</div>
			<div class="col-md-6">
				<label class="form-label">Phone</label>
				<input class="form-control" name="phone" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Email</label>
				<input class="form-control" name="email" type="email" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">County</label>
				<select class="form-select" name="county" required>
					<option value="">Select</option>
					{% for c in frappe.get_all('County', pluck='name') %}
					<option value="{{ c }}">{{ c }}</option>
					{% endfor %}
				</select>
			</div>
			<div class="col-md-6">
				<label class="form-label">Sub County</label>
				<input class="form-control" name="sub_county" required />
				<small class="text-muted">(Type the Sub County)</small>
			</div>
			<div class="col-md-6">
				<label class="form-label">Institution</label>
				<input class="form-control" name="institution" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Course</label>
				<input class="form-control" name="course" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Level of Study</label>
				<select class="form-select" name="level_of_study" required>
					<option value="">Select</option>
					{% for lvl in ["Certificate","Diploma","Degree","Masters","PhD"] %}
					<option value="{{ lvl }}">{{ lvl }}</option>
					{% endfor %}
				</select>
			</div>
			<div class="col-md-6">
				<label class="form-label">Year of Study</label>
				<select class="form-select" name="year_of_study" required>
					<option value="">Select</option>
					{% for yr in ["1st Year","2nd Year","3rd Year","4th Year","5th Year","Graduate"] %}
					<option value="{{ yr }}">{{ yr }}</option>
					{% endfor %}
				</select>
			</div>
			<div class="col-md-6">
				<label class="form-label">Attachment: CV (required)</label>
				<input class="form-control" type="file" name="cv_file" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Attachment: National ID Copy</label>
				<input class="form-control" type="file" name="nid_file" />
			</div>
			<div class="col-md-6">
				<label class="form-label">Attachment: School Letter (required)</label>
				<input class="form-control" type="file" name="school_letter_file" required />
			</div>
			<div class="col-md-6">
				<label class="form-label">Attachment: Certificates</label>
				<input class="form-control" type="file" name="certs_file" />
			</div>
		</div>

		<button class="btn btn-primary mt-3" type="submit">Submit Application</button>

		<div id="applyResult" class="mt-3"></div>
	</form>

	<hr class="my-4" />

	<h3 class="mb-3">Track Application Status</h3>
	<div class="row g-3 align-items-end">
		<div class="col-md-5">
			<label class="form-label">Application Reference Number</label>
			<input class="form-control" id="track_reference" placeholder="e.g. APP-2026-1234" />
		</div>
		<div class="col-md-5">
			<label class="form-label">Or Email</label>
			<input class="form-control" id="track_email" type="email" placeholder="your@email.com" />
		</div>
		<div class="col-md-2">
			<button class="btn btn-outline-primary w-100" type="button" id="trackBtn">Track</button>
		</div>
	</div>
	<div id="trackResult" class="mt-3"></div>
</div>


<script>
	async function callApi(method, args) {
		return new Promise((resolve, reject) => {
			frappe.call({
				method,
				args,
				callback: r => resolve(r.message),
				error: err => reject(err)
			});
		});
	}

	async function loadVacancies() {
		const data = await callApi('internship_management.api.get_available_internships', {});
		const root = document.getElementById('vacancies');
		root.innerHTML = '';
		(data.vacancies || []).forEach(v => {
			const col = document.createElement('div');
			col.className = 'col-md-6 mb-3';
				col.innerHTML = `
					<div class="card h-100">
						<div class="card-body">
							<h5 class="card-title">${v.vacancy_title}</h5>
							<p class="card-text mb-2">Department: ${v.department || ''}</p>
							<p class="card-text mb-2">Location: ${v.location || ''}</p>
							<p class="card-text mb-2">Vacancies: ${v.number_of_vacancies || ''}</p>
							<p class="card-text mb-2">Duration: ${v.duration || ''}</p>
							<p class="card-text mb-2">Qualifications: ${v.qualifications_required || ''}</p>
							<p class="card-text mb-2">Skills: ${v.skills_required || ''}</p>
							<p class="card-text mb-2">Deadline: ${v.application_deadline || ''}</p>
							<p class="card-text mb-2">Responsibilities: ${v.responsibilities || ''}</p>
							<p class="card-text mb-2">Required Documents: ${v.required_documents || ''}</p>
							<p class="card-text mb-2">Special Instructions: ${v.special_instructions || ''}</p>
							<button class="btn btn-outline-primary" type="button" data-id="${v.name}">Apply</button>

						</div>
					</div>`;

			col.querySelector('button').addEventListener('click', (e) => {
					document.getElementById('advertisement_applied_for').value = v.name;

					e.target.closest('.card').querySelector('button').disabled = true;
					alert('Selected vacancy for application');
				});
			root.appendChild(col);
		});
	}

	document.getElementById('applyForm').addEventListener('submit', async (e) => {
		e.preventDefault();
		const vacancy = document.getElementById('advertisement_applied_for').value;

		if (!vacancy) {
			document.getElementById('applyResult').innerText = 'Select a vacancy first.';
			return;
		}

		const fd = new FormData(e.target);
		// NOTE: Attachments handling in this template is simplified.
		// For production, you should upload files first to get file IDs,
		// then pass those IDs in `file_ids` / `attachments`.
		// Here we only submit form fields; the backend will accept file IDs if provided.

		const payload = {};
		payload.vacancy_applied_for = vacancy;
		for (const [k, v] of fd.entries()) {
			if (v instanceof File) continue;
			payload[k] = v;
		}

		try {
			const res = await callApi('internship_management.api.submit_internship_application', payload);
			document.getElementById('applyResult').innerText = res.message + ' (' + res.name + ')';
		} catch (err) {
			document.getElementById('applyResult').innerText = (err && err.message) ? err.message : 'Submission failed';
		}
	});

	async function trackStatus() {
		const reference_number = (document.getElementById('track_reference')?.value || '').trim();
		const email = (document.getElementById('track_email')?.value || '').trim();
		const args = { reference_number, email };
		try {
			const res = await callApi('internship_management.api.get_my_application_status', args);
			const el = document.getElementById('trackResult');
			if (!res.found) {
				el.innerText = res.message || 'No application found';
				return;
			}
			el.innerText = `Status: ${res.status} (Reference: ${res.reference_number})`;
		} catch (err) {
			document.getElementById('trackResult').innerText = (err && err.message) ? err.message : 'Track failed';
		}
	}

	document.getElementById('trackBtn').addEventListener('click', (e) => {
		trackStatus();
	});

	// boot
	frappe.ready(() => {
		loadVacancies();
	});
</script>
{% endblock %}
