{% extends "templates/web.html" %}

{% block page_content %}
<div class="container">
	<h2 class="mb-3">Application Screening</h2>

	<div class="card mb-3">
		<div class="card-body">
			<div class="row g-3 align-items-end">
				<div class="col-md-3">
					<label class="form-label">Department</label>
					<input class="form-control" id="flt_department" placeholder="e.g. IT" />
				</div>
				<div class="col-md-3">
					<label class="form-label">Opportunity/Vacancy</label>
					<input class="form-control" id="flt_vacancy" placeholder="Vacancy name" />
				</div>
				<div class="col-md-3">
					<label class="form-label">Qualification (Level of Study)</label>
					<input class="form-control" id="flt_qualification" placeholder="e.g. Degree" />
				</div>
				<div class="col-md-3">
					<label class="form-label">Institution</label>
					<input class="form-control" id="flt_institution" placeholder="School" />
				</div>

				<div class="col-md-3">
					<label class="form-label">Status</label>
					<select class="form-select" id="flt_status">
						<option value="">Any</option>
						{% for s in ["Submitted","Under Review","Shortlisted","Rejected","Interview Scheduled","Offered","Accepted","Withdrawn"] %}
							<option value="{{s}}">{{s}}</option>
						{% endfor %}
					</select>
				</div>

				<div class="col-md-3">
					<label class="form-label">Submission Date From</label>
					<input class="form-control" id="flt_date_from" type="date" />
				</div>
				<div class="col-md-3">
					<label class="form-label">Submission Date To</label>
					<input class="form-control" id="flt_date_to" type="date" />
				</div>
				<div class="col-md-3">
					<button class="btn btn-primary w-100" id="btn_load">Load Queue</button>

				</div>
			</div>
		</div>
	</div>

	<div class="card">
		<div class="card-body">
			<table class="table table-sm" id="queue_table">
				<thead>
					<tr>
						<th>Reference</th>
						<th>Applicant</th>
						<th>Department</th>
						<th>Vacancy</th>
						<th>Qualification</th>
						<th>Status</th>
						<th>Action</th>
					</tr>
					</thead>
				<tbody></tbody>
			</table>
		</div>
	</div>

	<hr class="my-4" />

	<div class="card">
		<div class="card-body">
			<h5 class="mb-3" id="details_title">Select an application</h5>

			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Screening Decision</label>
					<select class="form-select" id="dec_screening_decision">
						<option value="">Select</option>
						<option value="Shortlisted">Shortlisted</option>
						<option value="Reserved">Reserved</option>
						<option value="Rejected">Rejected</option>
						<option value="Pending">Pending Review</option>
					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Meets Minimum Requirements</label>
					<select class="form-select" id="dec_min_req">
						<option value="0">No</option>
						<option value="1" selected>Yes</option>
					</select>
				</div>

				<div class="col-12">
					<label class="form-label">Remarks</label>
					<textarea class="form-control" rows="3" id="dec_remarks" placeholder="Enter screening comments"></textarea>
				</div>
			</div>

			<div class="mt-3">
				<button class="btn btn-success" id="btn_submit_decision">Save Screening & Decision</button>
				<div class="text-muted mt-2" id="save_msg"></div>
			</div>
		</div>
	</div>
</div>

<script>
	async function callApi(method, args) {
		return new Promise((resolve, reject) => {
			if (typeof frappe === 'undefined' || !frappe.call) {
				reject(new Error('Frappe client is not available'));
				return;
			}
			frappe.call({
				method,
				args,
				callback: r => resolve((r && typeof r.message !== 'undefined') ? r.message : r),
				error: err => reject(err)
			});
		});
	}


	let selectedApp = null;

	function esc(s) {
		return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'<','>':'>','"':'"',"'":'&#39;'}[c]));
	}

	async function loadQueue() {
		const args = {
			filters: {
				department: document.getElementById('flt_department').value || null,
				vacancy_applied_for: document.getElementById('flt_vacancy').value || null,
				qualification: document.getElementById('flt_qualification').value || null,
				institution_name: document.getElementById('flt_institution').value || null,
				status: document.getElementById('flt_status').value || null,
				submission_date_from: document.getElementById('flt_date_from').value || null,
				submission_date_to: document.getElementById('flt_date_to').value || null,
			},
			limit: 50,
		};

		const res = await callApi('internship_management.api.get_screening_queue', args);
		const tbody = document.querySelector('#queue_table tbody');
		tbody.innerHTML = '';

		(res.items || []).forEach(it => {
			const tr = document.createElement('tr');
			tr.innerHTML = `
				<td>${esc(it.name)}</td>
				<td>${esc(it.applicant_name)}</td>
				<td>${esc(it.department || '')}</td>
				<td>${esc(it.vacancy_applied_for || '')}</td>
				<td>${esc(it.level_of_study || '')}</td>
				<td>${esc(it.application_status || '')}</td>
				<td><button class="btn btn-link btn-sm" type="button" data-id="${esc(it.name)}">Review</button></td>
			`;
			tr.querySelector('button').addEventListener('click', async (e) => {
					selectedApp = it.name;
					await showDetails(it.name);
				});
			tbody.appendChild(tr);
		});
	}

	async function showDetails(appName) {
		document.getElementById('details_title').innerText = `Reviewing ${appName}`;
		document.getElementById('save_msg').innerText = '';
		// Prefill from backend
		const res = await callApi('internship_management.api.get_application_for_screening', { application_name: appName });
		// Backend currently returns: application.screening_decision
		// Keep compatibility if a display field is ever added.
		document.getElementById('dec_screening_decision').value = res.application?.screening_decision || res.application?.screening_decision_display || '';
		document.getElementById('dec_min_req').value = res.application?.meets_minimum_requirements ? '1' : '0';
		document.getElementById('dec_remarks').value = res.application?.screening_remarks || '';
	}

	async function submitDecision() {
		if (!selectedApp) return;
		const payload = {
			application_name: selectedApp,
			decision: document.getElementById('dec_screening_decision').value,
			minimum_requirements_met: document.getElementById('dec_min_req').value === '1',
			remarks: document.getElementById('dec_remarks').value,
			send_regret_if_rejected: true,
		};
		try {
			const res = await callApi('internship_management.api.screen_application', payload);
			document.getElementById('save_msg').innerText = res.message || 'Saved';
		} catch (e) {
			document.getElementById('save_msg').innerText = (e && e.message) ? e.message : 'Save failed';
		}
	}

	document.getElementById('btn_load').addEventListener('click', loadQueue);
	document.getElementById('btn_submit_decision').addEventListener('click', submitDecision);
</script>
{% endblock %}
